services:
  ubwg-bot:
    image: ghcr.io/eschanet/ubwg-bot:0.1.1
    env_file:
      - path: .env
        required: false
    environment:
      - TELEGRAM_BOT_TOKEN
      - TELEGRAM_CHAT_ID
      - PRODUCT_URL
      - CHECK_INTERVAL_SECONDS
      - FAILURE_ALERT_THRESHOLD
      - HEARTBEAT_INTERVAL_SECONDS
      - MAX_BACKOFF_SECONDS
    volumes:
      - ./state.json:/app/state.json
    restart: unless-stopped
